# memobuild.yaml

# Purpose: Configuration file for MemoBuild

version: "1.0"  # Version of the configuration schema

build:
  name: "example-project"  # Name of the project
  target: "release"        # Build target (e.g., release, debug)
  sources:                 # List of source files or directories
    - src/
    - include/
    
dependencies:             # List of dependencies
  - name: "library1"
    version: "^1.2.3"      # Version constraint for the dependency
  - name: "library2"
    version: "2.0.0"

options:                  # Additional options for the build
  optimization: "high"    # Optimization level (e.g., low, medium, high)
  debug: false            # Debugging information
  verbose: true           # Verbose output during the build process

# Note: Add any other required sections based on the actual functionality